packages:
  - 'apps/*'
  - 'packages/*'

catalogs:
  react:
    react: '19.0.0'
    react-dom: '19.0.0'
  
  types:
    '@types/node': '20.10.0'
    '@types/react': '19.0.0'
    '@types/react-dom': '19.0.0'
  
  typescript:
    typescript: '5.3.3'
  
  testing:
    '@testing-library/react': '14.1.0'
    '@testing-library/jest-dom': '6.1.5'
    vitest: '1.0.0'
    '@vitest/ui': '1.0.0'
  
  playwright:
    '@playwright/test': '1.40.0'
    playwright: '1.40.0'

  ui:
    class-variance-authority: '^0.7.0'
    clsx: '^2.0.0'
    tailwind-merge: '^2.2.0'
    tailwindcss: '^3.3.0'

  state:
    zustand: '^4.4.0'
    '@reduxjs/toolkit': '^1.9.0'
    react-query: '^3.39.0'

  utils:
    'date-fns': '^2.30.0'
    lodash-es: '^4.17.0'
    zod: '^3.22.0'

  build:
    vite: '^5.0.0'
    '@vitejs/plugin-react': '^4.2.0'
    postcss: '^8.4.0'
    autoprefixer: '^10.4.0'

  lint:
    eslint: '^8.55.0'
    prettier: '^3.1.0'
    '@typescript-eslint/parser': '^6.13.0'
    '@typescript-eslint/eslint-plugin': '^6.13.0'

  monitoring:
    '@sentry/react': '^7.84.0'
    posthog-js: '^1.84.0'
    '@axe-core/react': '^4.8.0'

  storybook:
    storybook: '^7.6.0'
    '@storybook/react': '^7.6.0'
    '@storybook/addon-essentials': '^7.6.0'
    '@storybook/addon-interactions': '^7.6.0'
