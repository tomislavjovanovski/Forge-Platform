name: Deploy

on:
  push:
    branches: [main]

env:
  PNPM_HOME: /home/runner/.local/share/pnpm
  PATH: /home/runner/.local/share/pnpm:$PATH

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run tests
        run: pnpm test
      
      - name: Build all apps
        run: pnpm build:all
      
      - name: Deploy admin dashboard
        run: |
          # Add your deployment script here
          echo "Deploying admin dashboard..."
      
      - name: Deploy analytics dashboard
        run: |
          # Add your deployment script here
          echo "Deploying analytics dashboard..."
      
      - name: Deploy public portal
        run: |
          # Add your deployment script here
          echo "Deploying public portal..."
