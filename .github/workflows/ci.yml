name: QA + Build Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_HOME: /home/runner/.local/share/pnpm
  PATH: /home/runner/.local/share/pnpm:$PATH

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Debug tar availability
        run: |
          echo "PATH=$PATH"
          which tar || true
          tar --version || true
      - name: Determine checkout method
        id: checkout-method
        run: |
          if command -v tar >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v git >/dev/null 2>&1; then
            echo "checkout_method=git" >> $GITHUB_OUTPUT
          else
            echo "No tar or git available to checkout repository."
            exit 1
          fi
      - uses: actions/checkout@v4
        if: steps.checkout-method.outputs.checkout_method == 'actions'
      - name: Fallback checkout with git
        if: steps.checkout-method.outputs.checkout_method == 'git'
        run: |
          git config --global --add safe.directory /github/workspace
          rm -rf *
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.ref_name }}"
          git checkout FETCH_HEAD
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check

  unit-tests:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Determine checkout method
        id: checkout-method
        run: |
          if command -v tar >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v git >/dev/null 2>&1; then
            echo "checkout_method=git" >> $GITHUB_OUTPUT
          else
            echo "No tar or git available to checkout repository."
            exit 1
          fi
      - uses: actions/checkout@v4
        if: steps.checkout-method.outputs.checkout_method == 'actions'
      - name: Fallback checkout with git
        if: steps.checkout-method.outputs.checkout_method == 'git'
        run: |
          git config --global --add safe.directory /github/workspace
          rm -rf *
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.ref_name }}"
          git checkout FETCH_HEAD
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: true

  build:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [dashboard, playground]
    steps:
      - name: Determine checkout method
        id: checkout-method
        run: |
          if command -v tar >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v git >/dev/null 2>&1; then
            echo "checkout_method=git" >> $GITHUB_OUTPUT
          else
            echo "No tar or git available to checkout repository."
            exit 1
          fi
      - uses: actions/checkout@v4
        if: steps.checkout-method.outputs.checkout_method == 'actions'
      - name: Fallback checkout with git
        if: steps.checkout-method.outputs.checkout_method == 'git'
        run: |
          git config --global --add safe.directory /github/workspace
          rm -rf *
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.ref_name }}"
          git checkout FETCH_HEAD
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@forge/${{ matrix.app }}
      - uses: actions/upload-artifact@v3
        with:
          name: dist-${{ matrix.app }}
          path: apps/${{ matrix.app }}/dist

  e2e:
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: dashboard
            port: 4173
          - app: playground
            port: 4174
        browser: [chromium, firefox, webkit]
    steps:
      - name: Determine checkout method
        id: checkout-method
        run: |
          if command -v tar >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v git >/dev/null 2>&1; then
            echo "checkout_method=git" >> $GITHUB_OUTPUT
          else
            echo "No tar or git available to checkout repository."
            exit 1
          fi
      - uses: actions/checkout@v4
        if: steps.checkout-method.outputs.checkout_method == 'actions'
      - name: Fallback checkout with git
        if: steps.checkout-method.outputs.checkout_method == 'git'
        run: |
          git config --global --add safe.directory /github/workspace
          rm -rf *
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.ref_name }}"
          git checkout FETCH_HEAD
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps
      - run: |
          PW_APP=${{ matrix.app }} PW_PORT=${{ matrix.port }} \
          pnpm exec playwright test apps/${{ matrix.app }}/tests --project=${{ matrix.browser }} --reporter=html
      - uses: actions/upload-artifact@v3
        with:
          name: playwright-report-${{ matrix.app }}-${{ matrix.browser }}
          path: playwright-report

  accessibility:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Determine checkout method
        id: checkout-method
        run: |
          if command -v tar >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v git >/dev/null 2>&1; then
            echo "checkout_method=git" >> $GITHUB_OUTPUT
          else
            echo "No tar or git available to checkout repository."
            exit 1
          fi
      - uses: actions/checkout@v4
        if: steps.checkout-method.outputs.checkout_method == 'actions'
      - name: Fallback checkout with git
        if: steps.checkout-method.outputs.checkout_method == 'git'
        run: |
          git config --global --add safe.directory /github/workspace
          rm -rf *
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.ref_name }}"
          git checkout FETCH_HEAD
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:accessibility

  lighthouse:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Determine checkout method
        id: checkout-method
        run: |
          if command -v tar >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v git >/dev/null 2>&1; then
            echo "checkout_method=git" >> $GITHUB_OUTPUT
          else
            echo "No tar or git available to checkout repository."
            exit 1
          fi
      - uses: actions/checkout@v4
        if: steps.checkout-method.outputs.checkout_method == 'actions'
      - name: Fallback checkout with git
        if: steps.checkout-method.outputs.checkout_method == 'git'
        run: |
          git config --global --add safe.directory /github/workspace
          rm -rf *
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.ref_name }}"
          git checkout FETCH_HEAD
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@forge/dashboard
      - run: |
          pnpm --dir ./apps/dashboard exec vite preview --host 127.0.0.1 --port 4173 --strictPort &
          sleep 8
          pnpm exec lhci autorun --config .lighthouserc.json
