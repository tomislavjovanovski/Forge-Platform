name: QA + Build Pipeline

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

  unit-tests:
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: |
            ./apps/**/coverage/coverage-final.json
            ./packages/**/coverage/coverage-final.json
          fail_ci_if_error: true

  build:
    needs: [unit-tests]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [dashboard, playground]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build --filter=@forge/${{ matrix.app }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.app }}
          path: apps/${{ matrix.app }}/dist

  e2e:
    needs: [build]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - app: dashboard
            port: 4173

          - app: playground
            port: 4174

        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build --filter=@forge/${{ matrix.app }}

      - run: npx playwright install --with-deps

      - name: Start preview server
        run: |
          pnpm --dir ./apps/${{ matrix.app }} exec vite preview \
            --host 127.0.0.1 \
            --port ${{ matrix.port }} \
            --strictPort &

          sleep 10

      - name: Run Playwright tests
        run: |
          PW_APP=${{ matrix.app }} PW_PORT=${{ matrix.port }} \
          pnpm exec playwright test apps/${{ matrix.app }}/tests \
            --project=${{ matrix.browser }} \
            --reporter=html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.app }}-${{ matrix.browser }}
          path: playwright-report

  accessibility:
    needs: [unit-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:accessibility

  lighthouse:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build --filter=@forge/dashboard

      - name: Start dashboard preview
        run: |
          pnpm --dir ./apps/dashboard exec vite preview \
            --host 127.0.0.1 \
            --port 4173 \
            --strictPort &

          sleep 10

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun --config .lighthouserc.json