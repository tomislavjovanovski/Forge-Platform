          elif command -v curl >/dev/null 2>&1; then
            curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$ARCHIVE_URL" -o repo.zip
          else
            wget --header="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -O repo.zip "$ARCHIVE_URL"
          fi
          if command -v unzip >/dev/null 2>&1; then
            unzip repo.zip -d repo
          elif [ -n "$PYTHON" ]; then
            true
          else
            python3 -m zipfile -e repo.zip repo
          fi
          shopt -s dotglob
          subdir=$(find repo -maxdepth 1 -mindepth 1 -type d | head -n 1)
          mv "$subdir"/* .
          mv "$subdir"/.[!.]* . 2>/dev/null || true
          rm -rf repo repo.zip
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: true

