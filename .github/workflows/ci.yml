name: QA + Build Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_HOME: /home/runner/.local/share/pnpm
  PATH: /home/runner/.local/share/pnpm:$PATH

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Debug tar availability
        run: |
          echo "PATH=$PATH"
          which tar || true
          tar --version || true
      - name: Determine checkout method
        id: checkout-method
        run: |
          if command -v tar >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v busybox >/dev/null 2>&1 && busybox tar --help >/dev/null 2>&1; then
            echo "checkout_method=actions" >> $GITHUB_OUTPUT
          elif command -v git >/dev/null 2>&1; then
            echo "checkout_method=git" >> $GITHUB_OUTPUT
          elif command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1; then
            echo "checkout_method=python" >> $GITHUB_OUTPUT
          elif command -v curl >/dev/null 2>&1 || command -v wget >/dev/null 2>&1; then
            echo "checkout_method=zip" >> $GITHUB_OUTPUT
          else
            echo "No tar, git, python, curl, or wget available to checkout repository."
            exit 1
          fi
      - uses: actions/checkout@v4
        if: steps.checkout-method.outputs.checkout_method == 'actions'
      - name: Fallback checkout with git
        if: steps.checkout-method.outputs.checkout_method == 'git'
        run: |
          git config --global --add safe.directory /github/workspace
          rm -rf *
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD
      - name: Fallback checkout with archive
        if: steps.checkout-method.outputs.checkout_method == 'python' || steps.checkout-method.outputs.checkout_method == 'zip'
        run: |
          rm -rf *
          ARCHIVE_URL="https://api.github.com/repos/${{ github.repository }}/zipball/${{ github.sha }}"
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          elif command -v python >/dev/null 2>&1; then
            PYTHON=python
          fi
          if [ -n "$PYTHON" ]; then
            $PYTHON - <<'PY'
          import os, urllib.request, zipfile
          repo = os.environ['GITHUB_REPOSITORY']
          sha = os.environ['GITHUB_SHA']
          token = os.environ['GITHUB_TOKEN']
          url = f"https://api.github.com/repos/{repo}/zipball/{sha}"
          req = urllib.request.Request(url, headers={
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github.v3+json',
          })
          with urllib.request.urlopen(req) as r:
              data = r.read()
          with open('repo.zip', 'wb') as f:
              f.write(data)
          with zipfile.ZipFile('repo.zip') as z:
              z.extractall('repo')
            PY
          elif command -v curl >/dev/null 2>&1; then
            curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$ARCHIVE_URL" -o repo.zip
          else
            wget --header="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -O repo.zip "$ARCHIVE_URL"
          fi
          if command -v unzip >/dev/null 2>&1; then
            unzip repo.zip -d repo
          elif [ -n "$PYTHON" ]; then
            true
          else
            python3 -m zipfile -e repo.zip repo
          fi
          shopt -s dotglob
          subdir=$(find repo -maxdepth 1 -mindepth 1 -type d | head -n 1)
          mv "$subdir"/* .
          mv "$subdir"/.[!.]* . 2>/dev/null || true
          rm -rf repo repo.zip
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check

